<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; touch-action:none; }

    #rotateBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #222;
      color: white;
    }
    #timeline {
      position: absolute;
      top: 10px;
      left: 10%;
      width: 80%;
      height: 6px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }
    #progress {
      height: 100%;
      width: 0%;
      background: lime;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<button id="rotateBtn">Orientation: vertical</button>
<div id="timeline"><div id="progress"></div></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// LAYOUT
const LEFT_EDGE = canvas.width * 0.2;
const RIGHT_WALL = canvas.width * 0.75;
const END_LINE_Y = canvas.height * 0.2;
const START_LINE_Y = canvas.height - 80; // ~1 inch-ish depending on screen scale

// Load the images (replace with actual image file paths)
const partyHornBlue = new Image();
partyHornBlue.src = '1000069192-removebg-preview.png';  // Blue Image

const partyHornGreen = new Image();
partyHornGreen.src = '1000069191-removebg-preview.png';  // Green Image

const partyHornRed = new Image();
partyHornRed.src = '1000069189-removebg-preview.png';  // Red Image

// Ensure images are loaded before starting the game
partyHornBlue.onload = () => {
  partyHornGreen.onload = () => {
    partyHornRed.onload = () => {
      loop();  // Start the game once all images are loaded
    };
  };
};

// STATE
let speedMultiplier = 1;
let gameState = "playing";
let markers = [];
let current = 0;
let totalScore = 0;
let highScore = localStorage.getItem("qu33phHigh") || 0;

let startTime = Date.now();
let suddenDeath = false;
let explosions = [];
let scorePopups = [];
let lastRoundScore = 0;

const ROUND_TIME = 30;
const TOTAL_TIME = 45;

// ORIENTATION
const orientations = ["vertical", "angled", "horizontal"];
let orientationIndex = 0;
let currentOrientation = "vertical";

// Rotate button for changing orientation
document.getElementById("rotateBtn").onclick = () => {
  orientationIndex = (orientationIndex + 1) % orientations.length;
  currentOrientation = orientations[orientationIndex];
  document.getElementById("rotateBtn").innerText =
    "Orientation: " + currentOrientation;
};

// Marker creation logic
canvas.addEventListener("pointerdown", e => {
  if (gameState !== "playing") return;

  if (current >= 3 && markers.length === 0) return;

  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
  currentX = startX;
  currentY = startY;
});

let dragging = false, startX, startY, currentX, currentY;

function touching(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y) < 45;
}

function isTouchingAny(marker) {
  return markers.some(m => m !== marker && !m.fallen && touching(marker, m));
}

// ADD GAME LOOP

canvas.addEventListener("pointermove", e => {
  if (!dragging) return;
  currentX = e.clientX;
  currentY = e.clientY;
});

canvas.addEventListener("pointerup", () => {
  if (!dragging) return;
  dragging = false;

  if (current >= 3) return;

  let dx = currentX - startX;
  let dy = currentY - startY;

  let baseRot =
    currentOrientation === "vertical" ? 0 :
    currentOrientation === "angled" ? Math.PI / 6 :
    Math.PI / 2;

  markers.push({
    x: canvas.width / 2,
    y: canvas.height - 50,
    vx: dx * 0.2,
    vy: dy * 0.2,
    curve: dx * 0.0003,
    angleType: currentOrientation,
    color: colors[current],
    length: lengths[current],
    stopped: false,
    fallen: false,
    trail: [],
    rotation: baseRot,
    spinVelocity:
      currentOrientation === "vertical" ? 0.08 :
      currentOrientation === "angled" ? 0.12 :
      0.18,
    chairBoost: false,
    megaTriggered: false,
    armed: false,
    life: 0,
  });

  current++;
});

// UPDATE GAME AND MARKERS DRAW

function update() {
  let elapsed = (Date.now() - startTime) / 1000;

  if (elapsed > ROUND_TIME && elapsed <= TOTAL_TIME) {
    suddenDeath = true;
  }
  if (elapsed > TOTAL_TIME) {
    endGame();
  }

  markers.forEach(m => {
    if (m.stopped || m.fallen) return;

    m.life += 1 / 60; // count seconds (roughly)
    if (m.life >= 1) {
      m.stopped = true;
      m.vx = 0;
      m.vy = 0;
    }

    m.vx += m.curve;
    m.x += m.vx * speedMultiplier;
    m.y += m.vy * speedMultiplier;

    // ARMING SYSTEM (must enter playfield first)
    if (!m.armed && m.y < START_LINE_Y) {
      m.armed = true;
    }

    m.vx *= 0.94;
    m.vy *= 0.94;

    m.rotation += m.spinVelocity * speedMultiplier;
    m.spinVelocity *= 0.96;

    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 20) m.trail.shift();

    if (m.x < LEFT_EDGE) m.fallen = true;

    if (m.x > RIGHT_WALL) {
      m.x = RIGHT_WALL;
      m.vx *= -0.4;
    }

    if (m.y < END_LINE_Y) {
      m.y = END_LINE_Y;
      m.vy *= -0.2;
    }

    if (Math.abs(m.vx) < 0.05 && Math.abs(m.vy) < 0.05) {
      m.stopped = true;
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);  // Clear screen
  markers.forEach(m => {
    if (m.fallen) return;

    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rotation);

    if (m.color === "green") {
      ctx.drawImage(partyHornGreen, -partyHornGreen.width / 2, -partyHornGreen.height / 2);
    } else if (m.color === "red") {
      ctx.drawImage(partyHornRed, -partyHornRed.width / 2, -partyHornRed.height / 2);
    } else if (m.color === "blue") {
      ctx.drawImage(partyHornBlue, -partyHornBlue.width / 2, -partyHornBlue.height / 2);
    }

    ctx.restore();
  });
}

// LOOP FUNCTION
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
